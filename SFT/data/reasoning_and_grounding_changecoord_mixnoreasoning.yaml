# DATA_ROOT: 用户需指定数据根目录，例如 export DATA_ROOT=/path/to/your/datasets
datasets:
  # website
  - json_path: ${DATA_ROOT}/annotations/mind2web-reasoning_and_grounding_changecoord.json
    images_folder: "mind2web/"
    sampling_strategy: "all"
  - json_path: ${DATA_ROOT}/annotations/guiact-web-reasoning_and_grounding_changecoord.json
    images_folder: "guiact-web-multi-v2/images/"
    sampling_strategy: "all"
  - json_path: ${DATA_ROOT}/annotations/guiact-web-chinese-reasoning_and_grounding_changecoord.json
    images_folder: "guiact-web-multi-v2-chinese/images/"
    sampling_strategy: "all"
  - json_path: ${DATA_ROOT}/annotations/mind2web-reasoning_and_grounding_changecoord_noreason.json
    images_folder: "mind2web/"
    sampling_strategy: "all"
  - json_path: ${DATA_ROOT}/annotations/guiact-web-reasoning_and_grounding_changecoord_noreason.json
    images_folder: "guiact-web-multi-v2/images/"
    sampling_strategy: "all"
  - json_path: ${DATA_ROOT}/annotations/guiact-web-chinese-reasoning_and_grounding_changecoord_noreason.json
    images_folder: "guiact-web-multi-v2-chinese/images/"
    sampling_strategy: "all"

